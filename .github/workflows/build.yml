name: Build & Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'
          cache-dependency-path: third-party/catray/go.sum

      - name: Set up Android NDK
        run: |
          sdkmanager "ndk;27.2.12479018"
          echo "NDK_HOME=$ANDROID_SDK_ROOT/ndk/27.2.12479018" >> $GITHUB_ENV

      - name: Install gomobile
        run: |
          go install golang.org/x/mobile/cmd/gomobile@latest
          gomobile init

      - name: Build catray.aar
        working-directory: third-party/catray
        env:
          ANDROID_NDK_HOME: ${{ env.NDK_HOME }}
        run: |
          go mod tidy
          mkdir -p ../../app/libs
          GOEXPERIMENT="fieldtrack,boringcrypto,greenteagc" \
          gomobile bind \
            -v \
            -target=android/arm64 \
            -androidapi 30 \
            -trimpath \
            -ldflags='-s -w -buildid=' \
            -o ../../app/libs/catray.aar \
            .

      - name: Build hev-socks5-tunnel
        working-directory: third-party/hev-socks5-tunnel
        run: |
          $NDK_HOME/ndk-build \
            NDK_PROJECT_PATH=. \
            APP_BUILD_SCRIPT=Android.mk \
            APP_ABI="arm64-v8a" \
            APP_PLATFORM=android-30 \
            NDK_LIBS_OUT="../../app/src/main/jniLibs" \
            "APP_CFLAGS=-O3 -DPKGNAME=iwakura/lain/wheelvpn/service" \
            "APP_LDFLAGS=-Wl,--build-id=none -Wl,--hash-style=gnu -shared"

      - name: Build release APK
        run: ./gradlew assembleRelease

      - name: Upload APK to release
        uses: softprops/action-gh-release@v2
        with:
          files: app/build/outputs/apk/release/app-release.apk
